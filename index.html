<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki's Pocket - 記帳網</title>
    <style>
        :root {
            --bg-color: #003366;
            --card-bg: #14024f;
            --accent-color: #F6EFA6;
            --input-bg: #0a0129;
            --danger: #ff4d4d;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg-color); 
            color: var(--accent-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .card { 
            background: var(--card-bg); padding: 1.5rem; border-radius: 16px; 
            border: 1px solid rgba(246, 239, 166, 0.3); margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .total-box { text-align: center; font-size: 2rem; font-weight: 800; }
        .total-box span { color: #fff; text-shadow: 0 0 10px var(--accent-color); }

        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input, select { 
            padding: 12px; background: var(--input-bg); border: 1px solid var(--accent-color);
            border-radius: 8px; color: var(--accent-color); font-size: 1rem; outline: none;
        }

        .btn { 
            background: var(--accent-color); color: var(--card-bg); border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid rgba(246, 239, 166, 0.2);
        }
        .list-item .delete-btn {
            color: var(--danger); cursor: pointer; font-weight: bold; padding: 5px;
        }

        footer { margin-top: 20px; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card total-box">
        總支出：$<span id="totalAmount">0</span>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="itemName" placeholder="吃了什麼？買了什麼？" data-qa="input-name">
            <input type="number" id="itemPrice" placeholder="多少錢？" data-qa="input-price">
            <select id="itemCategory" data-qa="select-category">
                <option value="食">🍔 食</option>
                <option value="衣">👕 衣</option>
                <option value="住">🏠 住</option>
                <option value="行">🚗 行</option>
                <option value="健身">🏋️ 健身</option>
                <option value="貓咪">🐱 貓咪</option>
            </select>
            <button class="btn" onclick="addRecord()" data-qa="btn-add">記錄一筆</button>
        </div>
    </div>

    <div class="card" id="recordList">
        </div>

    <button style="background:none; border:1px solid var(--danger); color:var(--danger); padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="clearAll()">清空所有紀錄</button>
</div>

<footer>create by yuki</footer>

<script>
    let records = JSON.parse(localStorage.getItem('yuki_records')) || [];

    function updateUI() {
        const list = document.getElementById('recordList');
        const totalDisp = document.getElementById('totalAmount');
        list.innerHTML = records.length ? '' : '<p style="text-align:center; opacity:0.5;">目前沒有紀錄</p>';
        
        let total = 0;
        records.forEach((r, index) => {
            total += parseInt(r.price);
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <span>[${r.category}] ${r.name}</span>
                <span>$${r.price} <span class="delete-btn" onclick="deleteRecord(${index})">✕</span></span>
            `;
            list.appendChild(div);
        });
        totalDisp.innerText = total.toLocaleString();
        localStorage.setItem('yuki_records', JSON.stringify(records));
    }

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzslAu-NsoanzawEMUb_kUhzAXGBsbWMxYFIngAjfrtM0ElQbT9b6hOHml8fRkNg9llMw/exec"; 

    function addRecord() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const category = document.getElementById('itemCategory').value;

        if (!name || !price) return alert("請填寫完整資訊");

        const newRecord = { name, price, category };
        
        // 1. 本地更新 (確保 UI 馬上有反應)
        records.push(newRecord);
        updateUI();

        // 2. 透過 Google Form 同步到雲端
        const FORM_ACTION_URL = "https://docs.google.com/forms/d/e/1FAIpQLSc9V9KSYkEzEMGxhGybfbzsYTDpNLMDayiT6aNR52NNbncUJw/formResponse";
        
        const formData = new FormData();
        formData.append('entry.888001191', category); // 類別
        formData.append('entry.637993658', name);     // 項目
        formData.append('entry.1321951296', price);    // 金額

        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors", // 關鍵：告訴瀏覽器不要預檢，直接噴出去
            headers: {
                "Content-Type": "text/plain" // GAS 接收 no-cors 時，用這個 header 最穩
            },
            body: JSON.stringify(newRecord)
        })
        .then(() => {
            console.log("同步請求已發送至雲端");
        })
        .catch(err => {
            console.error("發送失敗:", err);
        });

        // 清空輸入框
        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
    }

    function deleteRecord(index) {
        records.splice(index, 1);
        updateUI();
    }

    function clearAll() {
        if (confirm("確定要刪除所有記帳紀錄嗎？")) {
            records = [];
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
